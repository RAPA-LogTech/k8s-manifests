apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: 717777571301.dkr.ecr.ap-northeast-2.amazonaws.com/log-platform-dev-dashboard:20260423204927
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: dashboard-config
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 250m
              memory: 256Mi
          startupProbe:
            httpGet:
              path: /
              port: 3000
            periodSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            periodSeconds: 5
